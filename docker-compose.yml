services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yonnn_user
      POSTGRES_PASSWORD: yonnn_password
      POSTGRES_DB: yonnn_db
    ports:
      # Host 15432 avoids Windows Hyper-V / excluded ranges that often block 5432–5433.
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yonnn_user -d yonnn_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: yonnn-api:local
    command: ["api"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://yonnn_user:yonnn_password@db:5432/yonnn_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-docker-dev-change-me-use-openssl-rand-hex-32}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: yonnn-frontend:local
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: yonnn-api:local
    command: ["worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://yonnn_user:yonnn_password@db:5432/yonnn_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-docker-dev-change-me-use-openssl-rand-hex-32}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # No Compose profile: recon tasks need a consumer. Omit worker only via overrides if you must.

volumes:
  pgdata:
  minio_data:
